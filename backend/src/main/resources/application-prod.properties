spring.datasource.url=${SPRING_DATASOURCE_URL}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD}

spring.kafka.bootstrap-servers=${SPRING_KAFKA_BOOTSTRAP_SERVERS}

server.port=8080

app.jwt.secret=${JWT_SECRET}
app.jwt.expiration-ms=${JWT_EXPIRATION_MS:36000000}

app.rate-limit.auth-per-minute=${RATE_LIMIT_AUTH_PER_MINUTE:12}
app.rate-limit.import-per-minute=${RATE_LIMIT_IMPORT_PER_MINUTE:3}
app.rate-limit.copilot-per-minute=${RATE_LIMIT_COPILOT_PER_MINUTE:30}
